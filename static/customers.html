<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Customers - Evolution Truck</title>

  <!-- ✅ ET Theme -->
  <link rel="stylesheet" href="/static/et-theme.css?v=1" />

  <style>
    .wrap { max-width: 1100px; margin: 20px auto; padding: 0 14px; }
    .topbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; }
    .topbar h1{ margin:0; }
    .topbar-right{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }

    .card{ background:#fff; border-radius:14px; padding:16px; box-shadow:0 2px 10px rgba(0,0,0,.06); margin-bottom:14px; }
    .row{ display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
    .col{ flex:1; min-width:240px; }
    label{ display:block; font-size:13px; color:#666; margin-bottom:6px; }
    input, select{
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #d6d9de;
      outline:none;
      background:#fff;
    }
    .muted{ color:#666; font-size:13px; }
    .pill{
      display:inline-flex; align-items:center;
      padding:6px 10px; border-radius:999px;
      background:#eef1f5; color:#2b2f36;
      font-size:12px; font-weight:700;
    }

    button{
      padding:10px 14px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:#d61f2c;
      color:#fff;
      font-weight:700;
      white-space:nowrap;
    }
    button:hover{ background:#ff3b30; }
    button.ghost{
      background: transparent;
      color:#d61f2c;
      border:1px solid #d61f2c;
    }
    button.ghost:hover{ background: rgba(214,31,44,.07); }

    /* Companies picker rápido */
    .company-box{
      border:1px solid #e4e7ee;
      border-radius:12px;
      padding:10px;
      max-height:170px;
      overflow:auto;
      background:#fafbfc;
    }
    .company-item{
      display:flex;
      align-items:center;
      gap:10px;
      padding:6px 6px;
      border-radius:10px;
    }
    .company-item:hover{ background:#f1f3f6; }
    .company-item input{ width:auto; }
    .company-tools{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }

    /* Tabla */
    table{ width:100%; border-collapse:collapse; margin-top:10px; }
    thead th{ text-align:left; font-size:12px; color:#666; padding:10px 8px; border-bottom:1px solid #e8ebf0; }
    tbody td{ padding:10px 8px; border-bottom:1px solid #f0f2f6; vertical-align:top; }
    .tag{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      background:#eef1f5;
      margin:2px 6px 2px 0;
    }
    .status-active{ font-weight:800; }
    .status-inactive{ font-weight:800; color:#8a8f98; }

    /* Form compact */
    .inline-check{
      display:flex; gap:8px; align-items:center; font-size:13px; color:#444;
      user-select:none;
    }
    .inline-check input{ width:auto; }
  </style>
</head>

<body>
  <div class="wrap">
    <header class="topbar">
      <h1>Customers</h1>
      <div class="topbar-right">
        <span class="pill" id="apiStatus">API: —</span>
        <button class="ghost" id="btnBack" type="button">⬅ Back</button>
      </div>
    </header>

    <!-- CREATE (rápido) -->
    <section class="card">
      <div class="row" style="justify-content:space-between; align-items:center;">
        <h2 style="margin:0;">Quick Create</h2>
        <span id="msg" class="muted"></span>
      </div>

      <div class="row" style="margin-top:10px;">
        <div class="col">
          <label>Name</label>
          <input id="name" type="text" placeholder="Customer name" autocomplete="off" />
        </div>
        <div class="col">
          <label>Phone</label>
          <input id="phone" type="text" placeholder="(optional)" autocomplete="off" />
        </div>
        <div class="col">
          <label>Email</label>
          <input id="email" type="email" placeholder="(optional)" autocomplete="off" />
        </div>
      </div>

      <div class="row" style="margin-top:10px;">
        <div class="col">
          <label>Companies</label>

          <div class="company-tools">
            <input id="companyFilter" type="text" placeholder="Search companies..." style="max-width:320px;" />
            <button class="ghost" id="btnQuickAddCompany" type="button">+ New Company</button>
            <span class="muted">Click to select (no Ctrl needed).</span>
          </div>

          <div class="company-box" id="companyBox">
            <div class="muted">Loading companies...</div>
          </div>
        </div>

        <div class="col" style="max-width:260px;">
          <label>&nbsp;</label>
          <button id="btnCreate" type="button">Create Customer</button>

          <div style="margin-top:10px;">
            <label class="inline-check">
              <input type="checkbox" id="chkAddVehicleNow" />
              Add vehicle now
            </label>
          </div>
        </div>
      </div>

      <!-- Vehicle quick fields (solo si chkAddVehicleNow) -->
      <div id="vehicleQuickWrap" style="display:none; margin-top:12px;">
        <h3 style="margin:10px 0 8px 0;">Vehicle (optional)</h3>
        <div class="row">
          <div class="col">
            <label>VIN (17 chars)</label>
            <input id="v_vin" type="text" maxlength="17" placeholder="(optional)" />
          </div>
          <div class="col">
            <label>Unit #</label>
            <input id="v_unit" type="text" placeholder="(optional)" />
          </div>
          <div class="col">
            <label>Year</label>
            <input id="v_year" type="number" placeholder="(optional)" />
          </div>
        </div>
        <div class="row" style="margin-top:10px;">
          <div class="col">
            <label>Make</label>
            <input id="v_make" type="text" placeholder="(optional)" />
          </div>
          <div class="col">
            <label>Model</label>
            <input id="v_model" type="text" placeholder="(optional)" />
          </div>
          <div class="col"></div>
        </div>
      </div>
    </section>

    <!-- LIST -->
    <section class="card">
      <div class="row" style="justify-content:space-between; align-items:center;">
        <h2 style="margin:0;">List</h2>

        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
          <input id="q" type="text" placeholder="Search customers..." style="max-width:320px;" />
          <label class="inline-check">
            <input type="checkbox" id="chkShowInactive" />
            Show inactive
          </label>
          <button class="ghost" id="btnRefresh" type="button">Refresh</button>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th style="width:70px;">ID</th>
            <th style="width:220px;">Name</th>
            <th>Companies</th>
            <th style="width:140px;">Phone</th>
            <th style="width:220px;">Email</th>
            <th style="width:110px;">Status</th>
            <th style="width:220px;">Action</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="7" class="muted">Loading...</td></tr>
        </tbody>
      </table>
    </section>
  </div>

  <script src="/static/customers.js?v=2"></script>
</body>
</html>
