<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Companies - Evolution Truck</title>

  <!-- ✅ ET Theme -->
  <link rel="stylesheet" href="/static/et-theme.css?v=1" />

  <style>
    /* Mini layout compatible con tu tema */
    .wrap { max-width: 1100px; margin: 20px auto; padding: 0 14px; }
    .topbar {
      display:flex; align-items:center; justify-content:space-between;
      gap:12px; margin-bottom: 14px;
    }
    .topbar h1 { margin:0; }
    .topbar-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }

    .card { background:#fff; border-radius:14px; padding:16px; box-shadow:0 2px 10px rgba(0,0,0,.06); }
    .row { display:flex; gap:12px; flex-wrap:wrap; }
    .col { flex:1; min-width: 240px; }
    label { display:block; font-size: 13px; color:#666; margin-bottom: 6px; }

    input {
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #d6d9de;
      outline:none;
      background:#fff;
    }

    .muted { color:#666; font-size:13px; }
    .pill {
      display:inline-flex; align-items:center;
      padding:6px 10px; border-radius:999px;
      background:#eef1f5; color:#2b2f36;
      font-size:12px; font-weight:700;
    }

    /* Botones alineados al look */
    button {
      padding:10px 14px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:#d61f2c;
      color:#fff;
      font-weight:700;
    }
    button:hover { background:#ff3b30; }

    button.ghost{
      background: transparent;
      color: #d61f2c;
      border: 1px solid #d61f2c;
    }
    button.ghost:hover{ background: rgba(214,31,44,.07); }

    /* Tabla */
    table { width:100%; border-collapse: collapse; margin-top: 10px; }
    thead th { text-align:left; font-size:12px; color:#666; padding:10px 8px; border-bottom:1px solid #e8ebf0; }
    tbody td { padding:10px 8px; border-bottom:1px solid #f0f2f6; }
  </style>
</head>

<body>
  <div class="wrap">
    <header class="topbar">
      <h1>Companies</h1>
      <div class="topbar-right">
        <span class="pill" id="apiStatus">API: —</span>

        <!-- ✅ NUEVO: pill de conteo -->
        <span class="pill" id="countPill">Companies: —</span>

        <button class="ghost" id="btnBack" type="button">⬅ Back</button>
      </div>
    </header>

    <!-- Create -->
    <section class="card" style="margin-bottom:14px;">
      <div class="row">
        <div class="col">
          <label>Company name</label>
          <input id="companyName" type="text" placeholder="e.g. ACME Logistics" />
        </div>
        <div class="col" style="max-width:240px;">
          <label>&nbsp;</label>
          <button id="btnCreate" type="button">Create</button>
        </div>
      </div>
      <div class="row" style="margin-top:10px;">
        <span id="msg" class="muted"></span>
      </div>
    </section>

    <!-- List -->
    <section class="card">
      <div class="row" style="justify-content:space-between;align-items:center;">
        <h2 style="margin:0;">List</h2>

        <!-- ✅ NUEVO: search + refresh -->
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
          <input id="searchBox" type="text" placeholder="Search companies..." style="max-width:280px;" />
          <button class="ghost" id="btnRefresh" type="button">Refresh</button>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th style="width:80px;">ID</th>
            <th>Name</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="2" class="muted">Loading...</td></tr>
        </tbody>
      </table>
    </section>
  </div>

  <script src="/static/companies.js?v=1"></script>
</body>
</html>
