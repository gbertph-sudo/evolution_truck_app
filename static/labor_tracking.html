<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/static/et-theme.css?v=1">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Labor / Time Tracking - Evolution Truck</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f6f8; }
    header {
      background:#111; color:#fff; padding:14px 18px;
      display:flex; justify-content:space-between; align-items:center;
    }
    header a { color:#fff; text-decoration:none; }
    .wrap { max-width: 1100px; margin: 20px auto; padding: 0 14px; }
    .card {
      background:#fff; border-radius:10px; padding:16px;
      box-shadow:0 2px 10px rgba(0,0,0,.06); margin-bottom:14px;
    }
    .muted { color:#666; font-size:14px; }
    button {
      padding:10px 14px; border:none; border-radius:8px; cursor:pointer;
      background:#d61f2c; color:#fff; font-weight:600;
    }
    button.secondary {
      background: transparent; color: #d61f2c; border: 1px solid #d61f2c;
    }
    .card h2 { position: relative; margin-top:0; }
    .card h2::after {
      content: ""; display:block; width:44px; height:3px; margin-top:8px;
      border-radius:999px; background: linear-gradient(90deg, #d61f2c, #ff3b30);
    }
    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
    .badge {
      display:inline-block; padding:6px 10px; background:#fff3f3; color:#d61f2c;
      border:1px solid #ffd3d3; border-radius:999px; font-size:12px; font-weight:700;
    }
    .box {
      background:#fafafa; border:1px dashed #ddd; border-radius:10px; padding:14px;
      margin-top:16px;
    }
  </style>
</head>
<body>
  <header>
    <div>⏱️ Labor / Time Tracking</div>
    <div>
      <button class="secondary" onclick="window.location.href='/dashboard.html'">Dashboard</button>
    </div>
  </header>

  <div class="wrap">
    <div class="card">
      <h2>Labor / Time Tracking</h2>
      <div class="muted">Track mechanic hours per job.</div>

      <div style="margin-top:14px;">
        <span class="badge">Placeholder module</span>
      </div>

      <div class="box">
        <strong>Screen ready.</strong><br><br>
        This page is already connected for navigation.<br>
        You can build the full logic later without changing the route or the dashboard card.
      </div>

      <div class="actions">
        <button onclick="window.location.href='/dashboard.html'">Back to Dashboard</button>
        <button onclick="alert('This module is scaffolded and ready for development.')">Test</button>
      </div>
    </div>
  </div>
</body>
</html>
